<div class="d-flex justify-content-between align-items-center mb-4">
  <h4 class="fw-bold mb-0">Quản lý Vận Đơn</h4>
  <button class="btn btn-primary d-flex align-items-center rounded-pill px-4">
    <i class="bi bi-plus-lg me-2"></i>
    Tạo Vận Đơn Mới
  </button>
</div>

<div class="card border-0 shadow-sm">
  <div class="card-body p-0">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="bg-light">
          <tr>
            <th class="ps-4 py-3 text-muted fw-bold">ID</th>
            <th class="py-3 text-muted fw-bold">Mã Vận Đơn</th>
            <th class="py-3 text-muted fw-bold">Người Nhận</th>
            <th class="py-3 text-muted fw-bold">Địa Chỉ</th>
            <th class="py-3 text-muted fw-bold">Trạng Thái</th>
            <th class="py-3 text-muted fw-bold">Ngày Tạo</th>
            <th class="text-end pe-4 py-3 text-muted fw-bold">Thao Tác</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let s of shipments">
            <td class="ps-4">#{{ s.id }}</td>
            <td class="fw-bold text-accent">{{ s.shipmentCode }}</td>
            <td>
              <div class="d-flex flex-column">
                <span class="fw-medium">{{ s.receiverName }}</span>
                <small class="text-muted">{{ s.receiverPhone }}</small>
              </div>
            </td>
            <td>
              <div class="text-truncate" style="max-width: 250px;" [title]="s.receiverAddress">
                {{ s.receiverAddress }}
              </div>
            </td>
            <td>
              <span [class]="'badge-status ' + getStatusClass(s.status)">
                {{ s.status }}
              </span>
            </td>
            <td class="text-muted">{{ s.createdAt | date:'shortDate' }}</td>
            <td class="text-end pe-4">
              <div class="btn-group shadow-none">
                <button [routerLink]="['/shipment', s.id]" class="btn btn-icon btn-light btn-sm text-info shadow-none" title="Chi tiết">
                  <i class="bi bi-eye"></i>
                </button>
                <button class="btn btn-icon btn-light btn-sm text-primary shadow-none" title="Sửa">
                  <i class="bi bi-pencil-square"></i>
                </button>
              </div>
            </td>
          </tr>
          <tr *ngIf="shipments.length === 0 && !loading">
            <td colspan="7" class="text-center py-5">
              <div class="py-3">
                <i class="bi bi-box-seam fs-1 text-muted opacity-25"></i>
                <p class="mt-2 text-muted">Không tìm thấy vận đơn nào hệ thống.</p>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
