server:
  port: 8081

spring:
  application:
    name: authentication-service
  flyway:
    enabled: true
    baseline-on-migrate: true
  keycloak:
    url: ${KEYCLOAK_URL:http://localhost:8080}
  cloud:
    vault:
      uri: ${VAULT_URI:http://localhost:8200}
      authentication: TOKEN
      token: ${VAULT_TOKEN:root}
      kv:
        enabled: true
        backend: secret
        default-context: authentication-service
  config:
    import: "optional:vault://"
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

grpc:
  server:
    port: 9091
    inProcessName: auth-server

management: # Health check
  endpoints:
    web:
      exposure:
        include: '*'
