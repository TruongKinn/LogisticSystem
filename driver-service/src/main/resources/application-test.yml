spring:
  config:
    activate:
      on-profile: test
  devtools:
    add-properties: false
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/driver_db}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:password}
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    hibernate:
      ddl-auto: none

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
openapi:
  service:
    api-docs: driver-service
    server: ${API_GATEWAY:http://localhost:4953}/driver
    title: Driver service
    version: 1.0.0
